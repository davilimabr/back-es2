services:
  mysql:
    image: mysql:8.0
    container_name: cardiotrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cardiotrack
      MYSQL_USER: cardiotrack
      MYSQL_PASSWORD: cardiotrack
    ports:
      - "3306:3306"
    volumes:
      - cardiotrack-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  cardiotrack-mysql-data:
